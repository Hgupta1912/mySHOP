<svg width="300" height="80" viewBox="0 0 300 80" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>mySHOP logo</title>

  <!-- shopping bag body -->
  <rect x="4" y="28" width="44" height="40" rx="5" fill="#15803d"/>

  <!-- bag handle -->
  <path d="M14 28 Q14 10 26 10 Q38 10 38 28" fill="none" stroke="#15803d" stroke-width="5" stroke-linecap="round"/>

  <!-- scarlet handle dots -->
  <circle cx="14" cy="28" r="3" fill="#dc2626"/>
  <circle cx="38" cy="28" r="3" fill="#dc2626"/>

  <!-- wordmark -->
  <text x="58" y="56"
    font-family="system-ui, sans-serif"
    font-size="38"
    font-weight="500"
    letter-spacing="-0.5"
    fill="#15803d">my<tspan fill="#1a1a1a">SHOP</tspan></text>
</svg>
